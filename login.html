<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Temple Darshan</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <!-- Loading Spinner -->
  <div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner"></div>
    <p>Checking session…</p>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="navbar-brand" href="./index.html">
      <div class="brand-icon">🛕</div>
      Temple Darshan
    </a>
    <ul class="navbar-nav">
      <li><a href="./index.html">Home</a></li>
      <li><a href="./signup.html"><button class="btn btn-primary btn-sm">Sign Up</button></a></li>
    </ul>
  </nav>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">🛕</div>
        <h2>Welcome Back</h2>
        <p class="text-muted">Sign in to access your bookings</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
          <div class="form-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div style="position:relative;">
            <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" style="padding-right:48px;" />
            <button type="button" id="togglePassword" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1rem; padding:0; color:var(--text-muted);">👁</button>
          </div>
          <div class="form-error" id="passwordError"></div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary btn-full mt-3">Sign In</button>
      </form>

      <div class="divider mt-3">or</div>

      <button id="googleSignInBtn" type="button" class="btn btn-full mt-2" style="display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:1.5px solid #dadce0;color:#3c4043;font-weight:500;font-size:0.97rem;padding:0.65rem 1rem;border-radius:8px;cursor:pointer;transition:box-shadow 0.2s;" onmouseover="this.style.boxShadow='0 1px 6px rgba(60,64,67,.3)'" onmouseout="this.style.boxShadow='none'">
        <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
        Continue with Google
      </button>

      <div class="auth-footer-link">
        Don't have an account? <a href="./signup.html">Create one free</a>
      </div>
      <div class="auth-footer-link mt-1">
        <a href="./index.html" style="color:var(--text-muted); font-size:0.85rem;">← Back to Home</a>
      </div>
    </div>
  </div>

  <script type="module" src="./js/login.js"></script>
</body>
</html>
