<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Temple Darshan</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <!-- Loading Spinner -->
  <div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner"></div>
    <p>Checking session…</p>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="navbar-brand" href="./index.html">
      <div class="brand-icon">🛕</div>
      Temple Darshan
    </a>
    <ul class="navbar-nav">
      <li><a href="./index.html">Home</a></li>
      <li><a href="./login.html">Sign In</a></li>
    </ul>
  </nav>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">🙏</div>
        <h2>Join Temple Darshan</h2>
        <p class="text-muted">Create your free account in seconds</p>
      </div>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Your full name" autocomplete="name" />
          <div class="form-error" id="nameError"></div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
          <div class="form-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div style="position:relative;">
            <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" autocomplete="new-password" style="padding-right:48px;" />
            <button type="button" data-toggle-password="password" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1rem; padding:0; color:var(--text-muted);">👁</button>
          </div>
          <div style="font-size:0.8rem; margin-top:4px; font-weight:500;" id="passwordStrength"></div>
          <div class="form-error" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div style="position:relative;">
            <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter your password" autocomplete="new-password" style="padding-right:48px;" />
            <button type="button" data-toggle-password="confirmPassword" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1rem; padding:0; color:var(--text-muted);">👁</button>
          </div>
          <div class="form-error" id="confirmError"></div>
        </div>

        <p style="font-size:0.78rem; color:var(--text-muted); margin-bottom:1rem;">
          By signing up, you agree to our Terms of Service and Privacy Policy.
        </p>

        <button type="submit" id="submitBtn" class="btn btn-primary btn-full">Create Account</button>
      </form>

      <div class="divider mt-3">or</div>

      <div class="auth-footer-link">
        Already have an account? <a href="./login.html">Sign in</a>
      </div>
      <div class="auth-footer-link mt-1">
        <a href="./index.html" style="color:var(--text-muted); font-size:0.85rem;">← Back to Home</a>
      </div>
    </div>
  </div>

  <script type="module" src="./js/signup.js"></script>
</body>
</html>
